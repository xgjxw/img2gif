name: build-windows

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller -y --clean --noconsole --onefile app.py -n pic2meme-py --icon .\icon.ico

      - name: Prepare release bundle
        shell: pwsh
        run: |
          $bundleDir = "release\pic2meme-py-windows-x64"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item "dist\pic2meme-py.exe" "$bundleDir\pic2meme-py.exe"
          @"
          pic2meme-py

          Usage
          1. Double click pic2meme-py.exe
          2. Drag an image into the window, or press Ctrl+V
          3. Output files are saved to Desktop\pic2meme-output

          Notes
          - This build does not depend on file-copy clipboard behavior
          - Artifacts are generated by GitHub Actions
          "@ | Set-Content -Path "$bundleDir\README.txt" -Encoding UTF8
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "release\pic2meme-py-windows-x64.zip" -Force

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: pic2meme-py-exe
          path: dist/pic2meme-py.exe
          if-no-files-found: error

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: pic2meme-py-windows-x64
          path: release/pic2meme-py-windows-x64.zip
          if-no-files-found: error
