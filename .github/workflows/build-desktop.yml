name: build-desktop

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build exe
        run: |
          pyinstaller -y --clean --noconsole --onefile app.py -n img2gif --icon .\icon.ico

      - name: Prepare release bundle
        shell: pwsh
        run: |
          $bundleDir = "release\img2gif-windows-x64"
          New-Item -ItemType Directory -Force -Path $bundleDir | Out-Null
          Copy-Item "dist\img2gif.exe" "$bundleDir\img2gif.exe"
          @"
          img2gif

          Usage
          1. Double click img2gif.exe
          2. Drag an image into the window, or press Ctrl+V
          3. Output files are saved to Desktop\pic2meme-output

          Notes
          - Clipboard import and clipboard output are enabled
          - Artifacts are generated by GitHub Actions
          "@ | Set-Content -Path "$bundleDir\README.txt" -Encoding UTF8
          Compress-Archive -Path "$bundleDir\*" -DestinationPath "release\img2gif-windows-x64.zip" -Force

      - name: Upload exe artifact
        uses: actions/upload-artifact@v4
        with:
          name: img2gif-windows-exe
          path: dist/img2gif.exe
          if-no-files-found: error

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: img2gif-windows-x64
          path: release/img2gif-windows-x64.zip
          if-no-files-found: error

  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build macOS binary
        run: |
          pyinstaller -y --clean --windowed --onefile app.py -n img2gif

      - name: Prepare release bundle
        run: |
          mkdir -p release/img2gif-macos
          cp dist/img2gif release/img2gif-macos/img2gif
          cat > release/img2gif-macos/README.txt <<'EOF'
          img2gif

          Usage
          1. Open img2gif
          2. Drag an image into the window, or press Command+V
          3. Output files are saved to Desktop/pic2meme-output

          Notes
          - Clipboard import and clipboard output are enabled
          - The macOS build is generated by GitHub Actions
          EOF
          cd release
          zip -r img2gif-macos.zip img2gif-macos

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: img2gif-macos
          path: release/img2gif-macos.zip
          if-no-files-found: error
